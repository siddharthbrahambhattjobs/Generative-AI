apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: springai-ingress
  namespace: springai
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 25m
spec:
  rules:
    - host: springai.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: springai-chat-service
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: springai-ui
                port:
                  number: 80
