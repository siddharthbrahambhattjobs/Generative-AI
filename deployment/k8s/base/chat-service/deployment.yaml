apiVersion: apps/v1
kind: Deployment
metadata:
  name: springai-chat-service
  namespace: springai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: springai-chat-service
  template:
    metadata:
      labels:
        app: springai-chat-service
    spec:
      containers:
        - name: springai-chat-service
          image: springai-chat-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: springai-platform-config
            - secretRef:
                name: springai-platform-secret
          volumeMounts:
            - name: uploads-storage
              mountPath: /app/data/uploads
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: '2'
              memory: 2Gi
      volumes:
        - name: uploads-storage
          persistentVolumeClaim:
            claimName: uploads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: springai-chat-service
  namespace: springai
spec:
  selector:
    app: springai-chat-service
  ports:
    - port: 8080
      targetPort: 8080
