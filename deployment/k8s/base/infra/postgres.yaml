apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: springai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: springai
            - name: POSTGRES_USER
              value: springai
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: springai-platform-secret
                  key: SPRING_DATASOURCE_PASSWORD
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ['sh', '-c', 'pg_isready -U springai -d springai']
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ['sh', '-c', 'pg_isready -U springai -d springai']
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: springai
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
